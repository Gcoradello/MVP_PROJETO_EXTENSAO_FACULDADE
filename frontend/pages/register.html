<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TACTICAL_OS_V1 // CADASTRO</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface-variant": "#c3c8c1",
                        "inverse-surface": "#e2e2e6",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed": "#161c23",
                        "on-error": "#690005",
                        "surface-dim": "#111316",
                        "surface-container": "#1e2023",
                        "on-secondary": "#223146",
                        "tertiary-fixed": "#dde3ec",
                        "primary-fixed-dim": "#b8cdaa",
                        "outline-variant": "#434843",
                        "surface-container-low": "#1a1c1f",
                        "secondary-fixed": "#d4e3fe",
                        "on-tertiary-container": "#cad0d9",
                        "on-primary-fixed-variant": "#3a4c31",
                        "secondary-container": "#3b4a60",
                        "on-primary": "#24351c",
                        "outline": "#8d928c",
                        "error-container": "#93000a",
                        "surface-tint": "#b8cdaa",
                        "on-secondary-fixed": "#0c1c30",
                        "tertiary": "#c1c7d0",
                        "surface-container-lowest": "#0c0e11",
                        "on-primary-fixed": "#101f09",
                        "secondary": "#b8c7e2",
                        "primary-container": "#4b5e41",
                        "on-surface": "#e2e2e6",
                        "tertiary-fixed-dim": "#c1c7d0",
                        "on-error-container": "#ffdad6",
                        "background": "#111316",
                        "on-secondary-container": "#aab9d3",
                        "secondary-fixed-dim": "#b8c7e2",
                        "on-tertiary-fixed-variant": "#41474f",
                        "on-tertiary": "#2b3138",
                        "inverse-on-surface": "#2f3034",
                        "surface-bright": "#37393d",
                        "on-primary-container": "#c1d6b2",
                        "surface-container-highest": "#333538",
                        "surface": "#111316",
                        "surface-container-high": "#282a2d",
                        "primary-fixed": "#d4e9c4",
                        "on-secondary-fixed-variant": "#39485d",
                        "tertiary-container": "#535961",
                        "inverse-primary": "#516447",
                        "surface-variant": "#333538",
                        "primary": "#b8cdaa",
                        "on-background": "#e2e2e6"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Custom scrollbar for tactical aesthetic */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #111316;
        }

        ::-webkit-scrollbar-thumb {
            background: #333538;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #b8cdaa;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary">
    <!-- TopAppBar -->
   <header
        class="fixed top-0 w-full z-50 rounded-none bg-[#111316] flex justify-between items-center px-6 h-16 w-full max-w-none">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#b8cdaa] text-xl">terminal</span>
            <h1 class="font-['Space_Grotesk'] uppercase tracking-widest text-sm font-bold text-[#b8cdaa]">TACTICAL_OS
            </h1>
        </div>
        <nav class="hidden md:flex gap-8">
            <a class="font-['Space_Grotesk'] uppercase tracking-widest text-sm text-slate-600 hover:text-slate-200 transition-colors"
                href="/frontend/pages/index.html">Home</a>
            <a class="font-['Space_Grotesk'] uppercase tracking-widest text-sm text-slate-600 hover:text-slate-200 "
                href="/frontend/pages/search.html">Search</a>
            <a class="font-['Space_Grotesk'] uppercase tracking-widest text-sm  text-[#b8cdaa] pb-1 border-b-2 border-[#b8cdaa] transition-colors"
                href="/frontend/pages/include.html">Cadastro</a>
            <a class="font-['Space_Grotesk'] uppercase tracking-widest text-sm text-slate-600 hover:text-slate-200 transition-colors"
                href="#">Análise</a>
        </nav>
        <div class="text-[#b8cdaa] font-['Space_Grotesk'] uppercase tracking-widest text-sm opacity-70">
            Colocar nome legal
        </div>
    </header>
    <!-- Main Canvas -->
    <main class="ml-64 mt-16 p-8 min-h-[calc(100vh-64px-32px)] flex flex-col items-center justify-start">
        <div class="w-full max-w-2xl mt-12">
            <!-- Header Section -->
            <div class="mb-12 border-l-4 border-primary pl-6">
                <h2 class="font-headline text-4xl font-bold tracking-tighter uppercase text-on-surface">
                    Cadastrar soldado</h2>
            </div>
            <!-- Registration Form -->
            <div class="bg-surface-container-low p-10 relative overflow-hidden">
                <form class="space-y-8">
                    <div class="grid grid-cols-1 ">
                        <!-- First Name -->
                        <div class="flex flex-col gap-1.5">
                            <label
                                class="font-label text-xs font-bold tracking-[0.05rem] uppercase text-on-surface-variant">WAR NAME</label>
                            <div class="relative">
                                <input
                                    id="form-war-name"
                                    class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant focus:ring-0 focus:border-primary text-on-surface py-3 px-0 font-body transition-all [color-scheme:dark]"
                                    placeholder="ENTER NAME..." type="text" />
                                <div class="absolute right-0 top-3 text-primary opacity-50">
                                    <span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="font-label text-xs font-bold tracking-[0.05rem] uppercase text-on-surface-variant">ID</label>
                        <div class="relative">
                            <input 
                                id="form-id"
                                class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant focus:ring-0 focus:border-primary text-on-surface py-3 px-0 font-body transition-all [color-scheme:dark]"
                                type="text" />
                        </div>
                    </div>
                    <!-- Unit/Pelotão Selection -->
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="font-label text-xs font-bold tracking-[0.05rem] uppercase text-on-surface-variant">Pelotão</label>
                        <div class="relative">
                            <select
                                id="form-squad"
                                class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant focus:ring-0 focus:border-primary text-on-surface py-3 px-0 font-body appearance-none transition-all cursor-pointer">
                                <option disabled="" selected="" value="">SELECT UNIT...</option>
                                <option value="alpha">ALPHA_PELOTÃO</option>
                            </select>
                            <div class="absolute right-0 top-3 pointer-events-none text-outline">
                                <span class="material-symbols-outlined"
                                    data-icon="keyboard_arrow_down">keyboard_arrow_down</span>
                            </div>
                        </div>
                    </div>
                    <!-- Action Buttons -->
                    <div class="flex flex-col sm:flex-row gap-4 pt-6">
                        <button
                            id="btn-submit-form"
                            class="flex-1 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold uppercase tracking-[0.1rem] py-4 text-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined" data-icon="database">database</span>
                            SAVE
                        </button>
                        <button
                            class="px-8 border border-outline-variant text-on-surface-variant font-headline font-bold uppercase tracking-[0.1rem] py-4 text-sm hover:bg-surface-container-highest active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                            type="reset">
                            <span class="material-symbols-outlined" data-icon="refresh">refresh</span>
                            CLEAR_FORM
                        </button>
                    </div>
                </form>
            </div>
            <!-- Meta Data Visual -->
            <div class="mt-8 flex justify-between items-center opacity-30">
                <div class="h-[1px] flex-1 bg-outline-variant"></div>
                <div class="px-4 font-label text-[9px] tracking-widest text-outline">END_OF_TRANSMISSION_PROTOCOL</div>
                <div class="h-[1px] flex-1 bg-outline-variant"></div>
            </div>
        </div>
    </main>
    <script type="module" src="/frontend/scripts/register/register-main.js"></script>
</body>

</html>
