    <style>
        .scanline-overlay {
            background: linear-gradient(to bottom,
                    rgba(18, 16, 16, 0) 50%,
                    rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }

        .corner-bracket-tr {
            position: absolute;
            top: 0;
            right: 0;
            width: 10px;
            height: 10px;
            border-top: 2px solid rgba(184, 205, 170, 0.4);
            border-right: 2px solid rgba(184, 205, 170, 0.4);
        }

        .corner-bracket-bl {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 10px;
            height: 10px;
            border-bottom: 2px solid rgba(184, 205, 170, 0.4);
            border-left: 2px solid rgba(184, 205, 170, 0.4);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .ghost-chip-active {
            box-shadow: inset 0 0 10px rgba(184, 205, 170, 0.2), 0 0 5px rgba(184, 205, 170, 0.1);
        }
    </style>

<body
    class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen overflow-x-hidden">
    <!-- Scanline Overlay -->
    <div class="fixed inset-0 scanline-overlay z-[100]"></div>
    <!-- Top Navigation Bar -->
    <header
        class="bg-[#111316]/80 backdrop-blur-md rounded-none w-full top-0 sticky z-50 flex justify-between items-center px-6 py-3 border-b border-[#444840]/20 shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#b8cdaa] text-xl">terminal</span>
            <h1 class="font-['Space_Grotesk'] uppercase tracking-widest text-sm font-bold text-[#b8cdaa]">TACTICAL_OS
            </h1>
        </div>
        <nav class="hidden md:flex gap-8">
            <a class="font-['Space_Grotesk'] uppercase tracking-widest text-sm text-slate-600 hover:text-slate-200 transition-colors"
                href="index.html">Home</a>
            <a class="font-['Space_Grotesk'] uppercase tracking-widest text-sm text-slate-600 hover:text-slate-200 "
                href="search.html">Search</a>
            <a class="font-['Space_Grotesk'] uppercase tracking-widest text-sm text-slate-600 hover:text-slate-200 transition-colors"
                href="register.html">Cadastro</a>
            <a class="font-['Space_Grotesk'] uppercase tracking-widest text-sm  text-[#b8cdaa] pb-1 border-b-2 border-[#b8cdaa] transition-colors"
                href="analise.html">Análise</a>
        </nav>
        <div class="text-[#b8cdaa] font-['Space_Grotesk'] uppercase tracking-widest text-sm opacity-70">
            Colocar nome legal
        </div>
    </header>
    
    <main class="max-w-[1600px] mx-auto w-full p-6 space-y-6">

    <!-- 🔎 FILTRO -->
    <section class="bg-surface-container-low p-6 border-l-4 border-primary">
        <div class="flex flex-col md:flex-row md:items-end gap-6">

            <!-- SELECT -->
            <div class="flex-1">
                <label class="block font-headline text-primary text-xs tracking-[0.2em] font-bold uppercase mb-2">
                    Personnel Filtration Unit
                </label>

                <div class="relative">
                    <select id="search-input-analitics"
                        class="w-full bg-surface-container-lowest border-b border-outline-variant text-on-surface py-3 px-3 focus:border-primary appearance-none">
                        <option disabled selected value="">SELECT_PELOTÃO</option>
                        <option value="alpha">ALPHA_PELOTÃO</option>
                    </select>

                    <span class="material-symbols-outlined absolute right-3 top-3 text-outline pointer-events-none">
                        expand_more
                    </span>
                </div>
            </div>

            <!-- BOTÃO -->
            <button id="search-btn-analitics"
                class="bg-primary text-on-primary font-headline font-bold uppercase tracking-widest px-8 py-3 flex items-center justify-center gap-2 hover:bg-primary-fixed-dim active:scale-95 transition-all">
                <span class="material-symbols-outlined text-lg">search</span>
                Search
            </button>

        </div>
    </section>

    <!-- 📊 HEADER ANALYTICS -->
    <section class="bg-surface-container-lowest p-6 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>

        <div class="flex flex-col md:flex-row justify-between gap-6">

            <!-- TEXTO -->
            <div>
                <h1 id="squad-name" class="text-2xl md:text-3xl font-black uppercase text-on-surface">
                    Squad name
                </h1>
            </div>

            <!-- MÉTRICAS -->
            <div class="flex gap-8">

                <div class="text-right">
                    <div class="text-xs text-outline-variant uppercase">FO TOTAL</div>
                    <div id="all-fo" class="text-primary text-xl font-bold"></div>
                </div>

                <div class="w-px bg-outline-variant/30"></div>

                <div class="text-right">
                    <div class="text-xs text-outline-variant uppercase">FO POSITIVE</div>
                    <div id="all-fo-positive" class="text-primary text-xl font-bold">%</div>
                </div>

                <div class="w-px bg-outline-variant/30"></div>

                <div class="text-right">
                    <div class="text-xs text-outline-variant uppercase">FO NEGATIVE</div>
                    <div id="all-fo-negative" class="text-error text-xl font-bold">%</div>
                </div>

            </div>
        </div>
    </section>

    <!-- 📊 CONTEÚDO -->
    <section class="grid grid-cols-12 gap-6">

        <!-- GRÁFICO -->
        <div class="col-span-12 bg-surface-container-low p-6">
            <h2 class="text-sm uppercase text-outline-variant mb-4">
                Squad Analytics
            </h2>

            <canvas id="chartSquad"></canvas>
        </div>

        <!-- RANKING -->
        <div class="col-span-12 bg-surface-container-low p-6">
            <h2 class="text-sm uppercase text-outline-variant mb-4">
                Ranking Soldiers
            </h2>

            <div id="ranking-list" class="space-y-2">
            </div>
        </div>

    </section>

</main>
    <script type="module" src="./scripts/analitics/analitics-main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
